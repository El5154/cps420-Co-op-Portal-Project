<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Report</title>
  <link rel="stylesheet" href="reviewReport.css" />
</head>
<body>
  <div class="page-container">
    <h1>Review Report</h1>

    <div id="message" class="message"></div>

    <section>
      <h2>Applicant Information</h2>
      <p><strong>Name:</strong> <span id="name">-</span></p>
      <p><strong>Student ID:</strong> <span id="studentID">-</span></p>
    </section>

    <section>
      <h2>Report Details</h2>
      <table id="reportDetailsTable">
        <thead>
          <tr>
            <th>Report Status</th>
            <th>Filename</th>
            <th>Submitted At</th>
            <th>Deadline</th>
            <th>Evaluation Status</th>
          </tr>
        </thead>
        <tbody id="reportDetailsTableBody">
          <tr>
            <td colspan="5" class="table-empty">Loading...</td>
          </tr>
        </tbody>
      </table>
    </section>

    <section>
      <h2>Set up Deadline</h2>
      <input type="date" id="deadline" />
      <button id="setDeadline">Set Deadline</button>
    </section>

    <button id="backBtn">Back to Dashboard</button>
  </div>

  <script src="config.js"></script>
  <script src="reviewReport.js"></script>
</body>
</html>
