<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Applicant Status</title>
  <link rel="stylesheet" href="applicant-status.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Application Status</h1>
      <button id="logoutBtn">Logout</button>
    </div>

    <div id="message" class="message"></div>

    <div class="card">
      <p><strong>Name:</strong> <span id="name">-</span></p>
      <p><strong>Student ID:</strong> <span id="studentID">-</span></p>
      <p><strong>Provisional Status:</strong> <span id="provisionalStatus">-</span></p>
      <p><strong>Final Status:</strong> <span id="finalStatus">-</span></p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="applicant-status.js"></script>
</body>
</html>
